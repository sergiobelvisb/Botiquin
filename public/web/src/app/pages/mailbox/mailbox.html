<div class="buzon-container">

    <div class="buzon-card">
  
      <h1>Buzón personalizado</h1>
      <p class="subtitle">
        Tu opinión nos ayuda a construir un mejor entorno de aprendizaje
      </p>
  
      <form>
  
        <label>¿A qué carrera de sanidad perteneces?</label>
        <input type="text" placeholder="Escribe el nombre de tu carrera" />
  
        <label>¿Qué asignatura se te complica más?</label>
        <input type="text" placeholder="Ej: Bioquímica" />
  
        <label>¿Estudias de manera autónoma? <span>(solo si no perteneces a ninguna carrera)</span> </label>
        <div class="radio-group">
          <label>
            <input type="radio" name="autonomo" value="si" /> Sí
          </label>
  
          <label>
            <input type="radio" name="autonomo" value="no" /> No
          </label>
        </div>
  
        <label>¿Qué complicaciones has tenido?</label>
        <textarea placeholder="Describe los obstáculos en tu estudio"></textarea>
  
        <label>¿Qué te hubiera gustado tener para facilitarte su estudio?</label>
        <textarea placeholder="Herramientas, recursos o dinámicas que eches falta"></textarea>
  
        <button type="submit">Enviar</button>
  
      </form>
  
    </div>
  
  </div>
